name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build backend
        working-directory: ./backend
        run: |
          go mod download
          go build -o server ./cmd/server

      - name: Run tests
        working-directory: ./backend
        run: go test -v ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          working-directory: ./frontend

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./lab-images
          file: ./lab-images/Dockerfile.base
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/lab-base:latest
            ghcr.io/${{ github.repository }}/lab-base:${{ github.sha }}

      - name: Build and push docker variant
        uses: docker/build-push-action@v5
        with:
          context: ./lab-images
          file: ./lab-images/Dockerfile.docker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/lab-docker:latest

      - name: Build and push kubernetes variant
        uses: docker/build-push-action@v5
        with:
          context: ./lab-images
          file: ./lab-images/Dockerfile.kubernetes
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/lab-kubernetes:latest

      - name: Build and push ansible variant
        uses: docker/build-push-action@v5
        with:
          context: ./lab-images
          file: ./lab-images/Dockerfile.ansible
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/lab-ansible:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to Kubernetes..."
          # Add deployment commands here
